<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-xl-8">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4 p-md-4">
          <div class="text-center mb-5">
            <h1 class="h2 fw-bold mb-2">Terms of Service</h1>
            <p class="text-muted">Please read carefully before using the platform</p>
          </div>

          <div class="terms-content">
            @for (term of terms; track term.title; let i = $index) {
              <div class="mb-4 pb-4 border-bottom">
                <h5 class="fw-bold mb-3 d-flex align-items-center gap-2">
                  <span class="badge bg-warning text-dark rounded-circle">{{ i + 1 }}</span>
                  {{ term.title }}
                </h5>
                <p class="text-muted mb-0" style="line-height: 1.7">
                  {{ term.content }}
                </p>
              </div>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
