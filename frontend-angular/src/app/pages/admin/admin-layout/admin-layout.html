<header class="navbar navbar-expand-lg navbar-dark admin-navbar sticky-top">
  <div class="container-fluid px-4">
    <a
      class="navbar-brand admin-brand d-flex align-items-center gap-2"
      routerLink="/admin/dashboard"
    >
      <i class="bi bi-shield-check fs-4 text-warning"></i>
      <span>Admin Panel</span>
    </a>

    <button
      class="navbar-toggler border-0"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#adminNavbar"
      aria-controls="adminNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <i class="bi bi-list fs-2 text-white"></i>
    </button>

    <div class="collapse navbar-collapse" id="adminNavbar">
      <ul class="navbar-nav admin-nav me-auto mb-2 mb-lg-0 ms-lg-4">
        <li class="nav-item">
          <a
            class="nav-link d-flex align-items-center gap-2"
            routerLink="/admin/dashboard"
            routerLinkActive="active"
          >
            <i class="bi bi-grid-1x2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link d-flex align-items-center gap-2"
            routerLink="/admin/users"
            routerLinkActive="active"
          >
            <i class="bi bi-people"></i> Users
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link d-flex align-items-center gap-2"
            routerLink="/admin/jobs"
            routerLinkActive="active"
          >
            <i class="bi bi-briefcase"></i> Jobs
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link d-flex align-items-center gap-2"
            routerLink="/admin/contracts"
            routerLinkActive="active"
          >
            <i class="bi bi-file-text"></i> Contracts
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link d-flex align-items-center gap-2"
            routerLink="/admin/reviews"
            routerLinkActive="active"
          >
            <i class="bi bi-star"></i> Reviews
          </a>
        </li>
      </ul>

      <div
        class="d-flex align-items-center gap-3 mt-3 mt-lg-0 pt-3 pt-lg-0 border-top border-secondary border-opacity-25 border-lg-0"
      >
        <div class="text-white-50 small me-2 d-none d-xl-block">
          Logged in as <span class="text-white fw-bold">{{ adminName }}</span>
        </div>
        <button class="btn btn-outline-danger btn-sm rounded-pill px-3" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
      </div>
    </div>
  </div>
</header>

<main class="admin-main p-4">
  <div class="container-fluid">
    <router-outlet></router-outlet>
  </div>
</main>
